<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">Compile and link pipeline</title>
  <desc id="desc">Two source files are compiled into object files and then linked into one executable.</desc>
  <rect width="900" height="260" fill="#0f172a"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#60a5fa"/>
    </marker>
    <style>
      text{font-family:Inter,Arial,sans-serif;fill:#e5e7eb;font-size:24px;font-weight:700}
      .small{fill:#a5b4fc;font-size:17px;font-weight:600}
      .box{fill:#1e293b;stroke:#64748b;stroke-width:2;rx:14}
      .accent{fill:#123a46;stroke:#2dd4bf}
      .arrow{stroke:#60a5fa;stroke-width:4;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="40" y="45" width="180" height="60"/>
  <text x="130" y="82" text-anchor="middle">source file 1</text>
  <rect class="box" x="40" y="155" width="180" height="60"/>
  <text x="130" y="192" text-anchor="middle">source file 2</text>
  <line class="arrow" x1="230" y1="75" x2="330" y2="75"/>
  <line class="arrow" x1="230" y1="185" x2="330" y2="185"/>
  <text class="small" x="280" y="55" text-anchor="middle">compile</text>
  <text class="small" x="280" y="165" text-anchor="middle">compile</text>
  <rect class="box" x="350" y="45" width="180" height="60"/>
  <text x="440" y="82" text-anchor="middle">object file 1</text>
  <rect class="box" x="350" y="155" width="180" height="60"/>
  <text x="440" y="192" text-anchor="middle">object file 2</text>
  <line class="arrow" x1="540" y1="75" x2="660" y2="130"/>
  <line class="arrow" x1="540" y1="185" x2="660" y2="130"/>
  <text class="small" x="620" y="103" text-anchor="middle">link</text>
  <rect class="box accent" x="690" y="100" width="170" height="70"/>
  <text x="775" y="142" text-anchor="middle">executable</text>
</svg>
