<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Vector handle and free-store elements</title>
  <desc id="desc">A Vector object stores a pointer and size; the pointer refers to elements allocated elsewhere.</desc>
  <rect width="900" height="300" fill="#0f172a"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2dd4bf"/>
    </marker>
    <style>
      text{font-family:Inter,Arial,sans-serif;fill:#e5e7eb;font-weight:700}
      .small{font-size:18px;fill:#cbd5e1}
      .box{fill:#1e293b;stroke:#64748b;stroke-width:2;rx:16}
      .cell{fill:#123a46;stroke:#2dd4bf;stroke-width:2}
      .arrow{stroke:#2dd4bf;stroke-width:4;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="box" x="70" y="70" width="250" height="160"/>
  <text x="195" y="110" text-anchor="middle" font-size="28">Vector handle</text>
  <text class="small" x="105" y="155">elem: pointer</text>
  <text class="small" x="105" y="195">sz: 6</text>
  <line class="arrow" x1="245" y1="150" x2="405" y2="150"/>
  <text class="small" x="560" y="90" text-anchor="middle">elements on the free store</text>
  <g transform="translate(420 120)">
    <rect class="cell" x="0" y="0" width="65" height="65"/>
    <rect class="cell" x="65" y="0" width="65" height="65"/>
    <rect class="cell" x="130" y="0" width="65" height="65"/>
    <rect class="cell" x="195" y="0" width="65" height="65"/>
    <rect class="cell" x="260" y="0" width="65" height="65"/>
    <rect class="cell" x="325" y="0" width="65" height="65"/>
    <text x="32" y="40" text-anchor="middle">0</text>
    <text x="97" y="40" text-anchor="middle">1</text>
    <text x="162" y="40" text-anchor="middle">2</text>
    <text x="227" y="40" text-anchor="middle">3</text>
    <text x="292" y="40" text-anchor="middle">4</text>
    <text x="357" y="40" text-anchor="middle">5</text>
  </g>
</svg>
